<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatQuest RPG</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="app">
        <header id="game-header">
            <h1>StatQuest RPG</h1>
            <div id="header-info">
                <span id="header-area">Vila dos Dados</span>
                <span id="header-keys">WASD/Setas: mover &nbsp;|&nbsp; Espaço: interagir &nbsp;|&nbsp; I: inventário &nbsp;|&nbsp; C: personagem</span>
            </div>
        </header>

        <div id="game-layout">
            <div id="left-panel">
                <div class="panel-title">Minimapa</div>
                <canvas id="minimap-canvas" width="180" height="180"></canvas>
                <div class="panel-section">
                    <div class="panel-title">Área Atual</div>
                    <div id="area-name">Vila dos Dados</div>
                    <div id="area-topic">Tipos de Dados</div>
                </div>
                <div class="panel-section">
                    <div class="panel-title">Maestria</div>
                    <div id="mastery-list"></div>
                </div>
            </div>

            <div id="game-canvas-container">
                <div id="game-container"></div>
            </div>

            <div id="right-panel">
                <div class="panel-title" id="char-name">Aventureiro</div>
                <div class="stat-row">
                    <span class="stat-label">Nível</span>
                    <span class="stat-value" id="char-level">1</span>
                </div>

                <div class="bar-container">
                    <div class="bar-label">HP</div>
                    <div class="bar-track">
                        <div class="bar-fill hp-bar" id="hp-bar" style="width:100%"></div>
                    </div>
                    <span class="bar-text" id="hp-text">100/100</span>
                </div>

                <div class="bar-container">
                    <div class="bar-label">Foco</div>
                    <div class="bar-track">
                        <div class="bar-fill focus-bar" id="focus-bar" style="width:100%"></div>
                    </div>
                    <span class="bar-text" id="focus-text">50/50</span>
                </div>

                <div class="bar-container">
                    <div class="bar-label">XP</div>
                    <div class="bar-track">
                        <div class="bar-fill xp-bar" id="xp-bar" style="width:0%"></div>
                    </div>
                    <span class="bar-text" id="xp-text">0/100</span>
                </div>

                <div class="panel-section">
                    <div class="panel-title">Atributos</div>
                    <div class="stat-row"><span class="stat-label">Forca</span><span class="stat-value" id="stat-str">5</span></div>
                    <div class="stat-row"><span class="stat-label">Inteligencia</span><span class="stat-value" id="stat-int">5</span></div>
                    <div class="stat-row"><span class="stat-label">Agilidade</span><span class="stat-value" id="stat-agi">5</span></div>
                    <div class="stat-row"><span class="stat-label">Vitalidade</span><span class="stat-value" id="stat-vit">5</span></div>
                    <div class="stat-row"><span class="stat-label">Ouro</span><span class="stat-value" id="stat-gold">0</span></div>
                </div>

                <div class="panel-section">
                    <div class="panel-title">Acoes</div>
                    <button class="action-btn" id="btn-inventory">Inventario (I)</button>
                    <button class="action-btn" id="btn-character">Personagem (C)</button>
                    <button class="action-btn" id="btn-save">Salvar (F5)</button>
                </div>
            </div>
        </div>

        <div id="chat-log">
            <div id="chat-messages"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
